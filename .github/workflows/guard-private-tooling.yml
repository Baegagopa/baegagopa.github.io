name: Guard Private Tooling

on:
  push:
  pull_request:

jobs:
  guard-private-tooling:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Ensure private tooling is not tracked
        run: |
          chmod +x .githooks/check-private-paths.sh
          ./.githooks/check-private-paths.sh tracked
